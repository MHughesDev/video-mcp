name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── fast path: unit + mocked integration (no FFmpeg required) ──────────────
  unit:
    name: Unit & mocked integration (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run lint (ruff, if available)
        run: |
          pip install ruff --quiet || true
          ruff check src/ tests/ || echo "ruff not available or found no issues"
        shell: bash

      - name: Run unit tests
        run: python -m pytest tests/unit/ -q --tb=short

      - name: Run mocked integration tests
        run: python -m pytest tests/integration/ -m "not realmedia" -q --tb=short

  # ── real-media path: runs only on ubuntu, requires FFmpeg ─────────────────
  real-media:
    name: Real-media integration (ubuntu / py3.11)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Verify FFmpeg
        run: ffmpeg -version && ffprobe -version

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run real-media tests
        run: python -m pytest -m realmedia tests/ -v --tb=short

  # ── benchmark: pure-Python, no FFmpeg needed ──────────────────────────────
  benchmark:
    name: Benchmark (ubuntu / py3.11)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run benchmark suite
        run: python scripts/benchmark.py --runs 1 --json
